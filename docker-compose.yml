version: '3.8'

services:
  # Database Service (MSSQL Server)
  db:
    image: postgres:15-alpine
    container_name: portfolio-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=YourSecurePassword123!
      - POSTGRES_DB=EmrePortfolioDb
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: always

  # Backend API Service
  api:
    build:
      context: .
      dockerfile: Portfolio.API/Dockerfile
    container_name: portfolio-api
    env_file:
      - Portfolio.API/.env
    environment:
      - DB_CONNECTION_STRING=Host=db;Database=EmrePortfolioDb;Username=postgres;Password=YourSecurePassword123!
      - ASPNETCORE_ENVIRONMENT=Production
    ports:
      - "5000:8080"
    depends_on:
      - db
    restart: always

  # Frontend UI Service
  ui:
    build:
      context: .
      dockerfile: Portfolio.UI/Dockerfile
    container_name: portfolio-ui
    ports:
      - "8080:80"
    restart: always

volumes:
  db-data:
